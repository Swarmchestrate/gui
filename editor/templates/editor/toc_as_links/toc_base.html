{% if not toc_list_items.items %}
<span class="text-body-secondary">Categories are listed here.</span>
{% else %}
<ul class="nav nav-pills flex-column list-unstyled editor-toc sticky-top">
    {% for list_item, list_item_data in toc_list_items.items %}
    <li class="nav-item">
        {% block list_item %}
        {% include 'editor/toc_as_links/active_editor_toc_list_item.html' %}
        {% endblock list_item %}
    </li>
    {% endfor %}
</ul>
{% endif %}
